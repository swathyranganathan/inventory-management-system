<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics — Inventory IMS</title>
    <link rel="stylesheet" href="css/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
        Inventory IMS
    </div>
    <div class="navbar-links">
        <a href="index.html">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="analytics.html" class="active">Analytics</a>
    </div>
</nav>

<main class="page">
    <div class="page-header">
        <h1>Inventory Analytics</h1>
        <p>Insights into your stock performance and value distribution</p>
    </div>

    <!-- Summary KPIs -->
    <div class="kpi-grid" id="kpiGrid">
        <div class="loading-center" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>

    <!-- Charts Row 1 -->
    <div class="grid-2" style="margin-bottom:20px;">
        <div class="card">
            <div class="card-header"><h2>Stock Status Distribution</h2></div>
            <div class="card-body" style="height:280px;display:flex;align-items:center;justify-content:center;">
                <canvas id="donutChart"></canvas>
            </div>
        </div>
        <div class="card">
            <div class="card-header"><h2>Inventory Value by Category</h2></div>
            <div class="card-body" style="height:280px;">
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Charts Row 2 -->
    <div class="grid-2" style="margin-bottom:20px;">
        <div class="card">
            <div class="card-header"><h2>Product Count by Category</h2></div>
            <div class="card-body" style="height:260px;">
                <canvas id="pieChart"></canvas>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <h2>Top Valued Products</h2>
                <span style="font-size:0.78rem;color:var(--text-muted);">by price × quantity</span>
            </div>
            <div class="card-body" style="padding:0;" id="topValuedTable">
                <div class="loading-center"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- Recently Added -->
    <div class="card">
        <div class="card-header">
            <h2>Recently Added (Last 7 Days)</h2>
        </div>
        <div class="card-body" id="recentTable">
            <div class="loading-center"><div class="spinner"></div></div>
        </div>
    </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { AnalyticsAPI } from './js/api.js';
import { showToast, badgeHTML, formatCurrency, formatDate } from './js/utils.js';

async function loadAnalytics() {
    try {
        const [summary, topValued, recent] = await Promise.all([
            AnalyticsAPI.getSummary(),
            AnalyticsAPI.getTopValued(10),
            AnalyticsAPI.getRecent(7)
        ]);
        renderKPIs(summary);
        renderDonut(summary);
        renderBar(summary.categoryStats);
        renderPie(summary.categoryStats);
        renderTopValued(topValued);
        renderRecent(recent);
    } catch (e) {
        showToast('Failed to load analytics', 'error');
        console.error(e);
    }
}

function renderKPIs(s) {
    document.getElementById('kpiGrid').innerHTML = `
        <div class="kpi-card primary">
            <div class="kpi-label">Total Products</div>
            <div class="kpi-value">${s.totalProducts}</div>
            <div class="kpi-sub">Across ${s.totalCategories} categories</div>
        </div>
        <div class="kpi-card success">
            <div class="kpi-label">Total Inventory Value</div>
            <div class="kpi-value" style="font-size:1.5rem;">${formatCurrency(s.totalInventoryValue)}</div>
            <div class="kpi-sub">Sum of price × quantity</div>
        </div>
        <div class="kpi-card danger">
            <div class="kpi-label">Low Stock Items</div>
            <div class="kpi-value">${s.lowStockCount}</div>
            <div class="kpi-sub">Quantity &lt; 10</div>
        </div>
        <div class="kpi-card warning">
            <div class="kpi-label">Normal Stock Items</div>
            <div class="kpi-value">${s.normalStockCount}</div>
            <div class="kpi-sub">Quantity &gt; 20</div>
        </div>
    `;
}

function renderDonut(s) {
    new Chart(document.getElementById('donutChart'), {
        type: 'doughnut',
        data: {
            labels: ['Normal (>20)', 'Medium (10-20)', 'Low (<10)'],
            datasets: [{
                data: [s.normalStockCount, s.mediumStockCount, s.lowStockCount],
                backgroundColor: ['#27AE60', '#E67E22', '#C0392B'],
                borderWidth: 3,
                borderColor: '#fff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { padding: 16, font: { size: 12 } } }
            },
            cutout: '65%'
        }
    });
}

function renderBar(cats) {
    if (!cats?.length) return;
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: cats.map(c => c.category),
            datasets: [{
                label: 'Total Value ($)',
                data: cats.map(c => parseFloat(c.totalValue)),
                backgroundColor: cats.map((_, i) =>
                    ['#1E3A5F','#2E6DA4','#3B82F6','#60A5FA','#93C5FD'][i % 5]),
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: 'y',
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { callback: v => '$' + Number(v).toLocaleString() } }
            }
        }
    });
}

function renderPie(cats) {
    if (!cats?.length) return;
    const colors = ['#1E3A5F','#27AE60','#E67E22','#C0392B','#8E44AD','#16A085','#D35400','#2980B9'];
    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: cats.map(c => c.category),
            datasets: [{
                data: cats.map(c => c.productCount),
                backgroundColor: colors,
                borderWidth: 2,
                borderColor: '#fff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } }
        }
    });
}

function renderTopValued(products) {
    if (!products.length) {
        document.getElementById('topValuedTable').innerHTML = '<p style="padding:24px;text-align:center;color:var(--text-muted)">No data.</p>';
        return;
    }
    const maxVal = Math.max(...products.map(p => p.price * p.quantity));
    const rows = products.map((p, i) => {
        const val = parseFloat(p.price) * p.quantity;
        const pct = ((val / maxVal) * 100).toFixed(1);
        return `<tr>
            <td style="color:var(--text-muted);font-size:0.8rem;width:28px;">${i+1}</td>
            <td style="font-weight:600;">${p.name}</td>
            <td>${p.category}</td>
            <td>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div style="flex:1;height:6px;background:var(--bg);border-radius:4px;">
                        <div style="width:${pct}%;height:100%;background:var(--primary-lt);border-radius:4px;"></div>
                    </div>
                    <span style="font-size:0.82rem;font-weight:600;min-width:64px;text-align:right;">${formatCurrency(val)}</span>
                </div>
            </td>
        </tr>`;
    }).join('');
    document.getElementById('topValuedTable').innerHTML = `
        <div class="table-wrap">
            <table>
                <thead><tr><th>#</th><th>Product</th><th>Category</th><th>Total Value</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
}

function renderRecent(products) {
    if (!products.length) {
        document.getElementById('recentTable').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:24px;">No products added in the last 7 days.</p>';
        return;
    }
    const rows = products.map(p => `
        <tr>
            <td style="font-weight:600;">${p.name}</td>
            <td>${p.category}</td>
            <td>${formatCurrency(p.price)}</td>
            <td>${p.quantity}</td>
            <td>${badgeHTML(p.stockStatus)}</td>
            <td style="color:var(--text-muted);font-size:0.82rem;">${formatDate(p.createdAt)}</td>
        </tr>`).join('');
    document.getElementById('recentTable').innerHTML = `
        <div class="table-wrap">
            <table>
                <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Qty</th><th>Status</th><th>Added</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
}

loadAnalytics();
</script>
</body>
</html>
