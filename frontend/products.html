<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products — Inventory IMS</title>
    <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
        Inventory IMS
    </div>
    <div class="navbar-links">
        <a href="index.html">Dashboard</a>
        <a href="products.html" class="active">Products</a>
        <a href="analytics.html">Analytics</a>
    </div>
</nav>

<main class="page">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
        <div>
            <h1>Products</h1>
            <p>Manage your product catalog and stock levels</p>
        </div>
        <button class="btn btn-success" id="btnAdd">+ Add Product</button>
    </div>

    <!-- Toolbar: search + filter -->
    <div class="toolbar">
        <div class="search-wrap">
            <span class="search-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            </span>
            <input type="text" class="form-control" id="searchInput" placeholder="Search products…" />
        </div>
        <select class="form-control" id="categoryFilter" style="width:auto;min-width:150px;">
            <option value="">All Categories</option>
        </select>
        <select class="form-control" id="statusFilter" style="width:auto;min-width:140px;">
            <option value="">All Status</option>
            <option value="LOW">Low Stock</option>
            <option value="MEDIUM">Medium</option>
            <option value="NORMAL">Normal</option>
        </select>
    </div>

    <!-- Products Table -->
    <div class="card">
        <div class="card-body" style="padding:0;">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Status</th>
                            <th>Added</th>
                            <th style="text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <tr><td colspan="8" style="text-align:center;padding:40px;">
                            <div class="spinner" style="margin:auto;"></div>
                        </td></tr>
                    </tbody>
                </table>
            </div>
            <div id="paginationBar" class="pagination"></div>
        </div>
    </div>
</main>

<!-- ── Add/Edit Modal ─────────────────────────────────────── -->
<div class="modal-overlay" id="productModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">Add Product</h2>
            <button class="modal-close" id="modalClose">×</button>
        </div>
        <form id="productForm" novalidate>
            <input type="hidden" id="productId" />
            <div class="form-group">
                <label for="fieldName">Product Name *</label>
                <input type="text" id="fieldName" class="form-control" placeholder="e.g. Wireless Keyboard" />
                <span class="field-error" id="errName"></span>
            </div>
            <div class="form-group">
                <label for="fieldCategory">Category *</label>
                <input type="text" id="fieldCategory" class="form-control" placeholder="e.g. Electronics" list="categoryList" />
                <datalist id="categoryList"></datalist>
                <span class="field-error" id="errCategory"></span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                    <label for="fieldPrice">Price ($) *</label>
                    <input type="number" id="fieldPrice" class="form-control" placeholder="0.00" min="0" step="0.01" />
                    <span class="field-error" id="errPrice"></span>
                </div>
                <div class="form-group">
                    <label for="fieldQuantity">Quantity *</label>
                    <input type="number" id="fieldQuantity" class="form-control" placeholder="0" min="0" />
                    <span class="field-error" id="errQuantity"></span>
                </div>
            </div>
        </form>
        <div class="modal-footer">
            <button class="btn btn-ghost" id="btnCancel">Cancel</button>
            <button class="btn btn-primary" id="btnSave">Save Product</button>
        </div>
    </div>
</div>

<!-- ── Delete Confirm Modal ──────────────────────────────── -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width:380px;">
        <div class="modal-header">
            <h2>Delete Product</h2>
            <button class="modal-close" id="deleteModalClose">×</button>
        </div>
        <p style="color:var(--text-muted);font-size:0.9rem;">Are you sure you want to delete <strong id="deleteProductName"></strong>? This action cannot be undone.</p>
        <div class="modal-footer">
            <button class="btn btn-ghost" id="btnDeleteCancel">Cancel</button>
            <button class="btn btn-danger" id="btnDeleteConfirm">Delete</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { ProductAPI } from './js/api.js';
import { showToast, badgeHTML, formatCurrency, formatDate, debounce } from './js/utils.js';

let currentPage = 0;
let totalPages  = 1;
let allProducts = [];
let deleteTargetId = null;

// ── Init ─────────────────────────────────────────────────────
async function init() {
    await loadCategories();
    await loadProducts();
    bindEvents();
}

// ── Load Products ─────────────────────────────────────────────
async function loadProducts(page = 0) {
    currentPage = page;
    showTableLoading();
    try {
        const search   = document.getElementById('searchInput').value.trim();
        const category = document.getElementById('categoryFilter').value;
        const status   = document.getElementById('statusFilter').value;

        let data;
        if (search) {
            const list = await ProductAPI.search(search);
            data = { content: list, totalPages: 1 };
        } else if (category) {
            const list = await ProductAPI.getByCategory(category);
            data = { content: list, totalPages: 1 };
        } else {
            data = await ProductAPI.getAll(page, 15);
        }

        let products = data.content;
        if (status) products = products.filter(p => p.stockStatus === status);

        allProducts = products;
        totalPages  = data.totalPages || 1;
        renderTable(products);
        renderPagination();
    } catch (e) {
        showToast('Failed to load products', 'error');
        document.getElementById('productTableBody').innerHTML =
            '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--danger)">Failed to load products.</td></tr>';
    }
}

function showTableLoading() {
    document.getElementById('productTableBody').innerHTML =
        '<tr><td colspan="8" style="text-align:center;padding:40px;"><div class="spinner" style="margin:auto;"></div></td></tr>';
}

function renderTable(products) {
    if (!products.length) {
        document.getElementById('productTableBody').innerHTML =
            '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted)">No products found.</td></tr>';
        return;
    }
    document.getElementById('productTableBody').innerHTML = products.map((p, i) => `
        <tr>
            <td style="color:var(--text-muted);font-size:0.8rem;">${p.id}</td>
            <td style="font-weight:600;">${escapeHtml(p.name)}</td>
            <td><span style="background:var(--bg);padding:2px 8px;border-radius:4px;font-size:0.8rem;">${escapeHtml(p.category)}</span></td>
            <td>${formatCurrency(p.price)}</td>
            <td style="font-weight:600;">${p.quantity}</td>
            <td>${badgeHTML(p.stockStatus)}</td>
            <td style="color:var(--text-muted);font-size:0.82rem;">${formatDate(p.createdAt)}</td>
            <td style="text-align:center;">
                <button class="btn btn-ghost btn-sm" onclick="openEdit(${p.id})">✏️ Edit</button>
                <button class="btn btn-danger btn-sm" style="margin-left:4px;" onclick="openDelete(${p.id}, '${escapeHtml(p.name)}')">🗑</button>
            </td>
        </tr>
    `).join('');
}

function renderPagination() {
    const bar = document.getElementById('paginationBar');
    if (totalPages <= 1) { bar.innerHTML = ''; return; }
    let html = `<button ${currentPage === 0 ? 'disabled' : ''} onclick="loadProducts(${currentPage - 1})">‹ Prev</button>`;
    for (let i = 0; i < totalPages; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="loadProducts(${i})">${i + 1}</button>`;
    }
    html += `<button ${currentPage === totalPages - 1 ? 'disabled' : ''} onclick="loadProducts(${currentPage + 1})">Next ›</button>`;
    bar.innerHTML = html;
}

// ── Categories ────────────────────────────────────────────────
async function loadCategories() {
    try {
        const cats = await ProductAPI.getCategories();
        const select = document.getElementById('categoryFilter');
        const datalist = document.getElementById('categoryList');
        cats.forEach(c => {
            select.insertAdjacentHTML('beforeend', `<option value="${c}">${c}</option>`);
            datalist.insertAdjacentHTML('beforeend', `<option value="${c}">`);
        });
    } catch {}
}

// ── Add / Edit ────────────────────────────────────────────────
function openAdd() {
    clearForm();
    document.getElementById('modalTitle').textContent = 'Add Product';
    document.getElementById('productId').value = '';
    document.getElementById('productModal').classList.add('open');
}

window.openEdit = async function(id) {
    try {
        const p = await ProductAPI.getById(id);
        document.getElementById('modalTitle').textContent = 'Edit Product';
        document.getElementById('productId').value = p.id;
        document.getElementById('fieldName').value = p.name;
        document.getElementById('fieldCategory').value = p.category;
        document.getElementById('fieldPrice').value = p.price;
        document.getElementById('fieldQuantity').value = p.quantity;
        clearErrors();
        document.getElementById('productModal').classList.add('open');
    } catch { showToast('Could not load product', 'error'); }
};

async function saveProduct() {
    if (!validateForm()) return;
    const id = document.getElementById('productId').value;
    const data = {
        name:     document.getElementById('fieldName').value.trim(),
        category: document.getElementById('fieldCategory').value.trim(),
        price:    parseFloat(document.getElementById('fieldPrice').value),
        quantity: parseInt(document.getElementById('fieldQuantity').value),
    };
    try {
        document.getElementById('btnSave').textContent = 'Saving…';
        document.getElementById('btnSave').disabled = true;
        if (id) {
            await ProductAPI.update(id, data);
            showToast('Product updated!', 'success');
        } else {
            await ProductAPI.create(data);
            showToast('Product created!', 'success');
        }
        closeModal();
        await loadProducts(currentPage);
    } catch (e) {
        if (e.fieldErrors) {
            Object.entries(e.fieldErrors).forEach(([f, msg]) => {
                const el = document.getElementById('err' + capitalize(f));
                if (el) el.textContent = msg;
            });
        } else {
            showToast(e.message || 'Save failed', 'error');
        }
    } finally {
        document.getElementById('btnSave').textContent = 'Save Product';
        document.getElementById('btnSave').disabled = false;
    }
}

// ── Delete ────────────────────────────────────────────────────
window.openDelete = function(id, name) {
    deleteTargetId = id;
    document.getElementById('deleteProductName').textContent = name;
    document.getElementById('deleteModal').classList.add('open');
};

async function confirmDelete() {
    if (!deleteTargetId) return;
    try {
        await ProductAPI.delete(deleteTargetId);
        showToast('Product deleted.', 'success');
        document.getElementById('deleteModal').classList.remove('open');
        await loadProducts(currentPage);
    } catch { showToast('Delete failed', 'error'); }
    deleteTargetId = null;
}

// ── Validation ────────────────────────────────────────────────
function validateForm() {
    clearErrors();
    let ok = true;
    const name = document.getElementById('fieldName').value.trim();
    const cat  = document.getElementById('fieldCategory').value.trim();
    const price = document.getElementById('fieldPrice').value;
    const qty   = document.getElementById('fieldQuantity').value;
    if (!name) { document.getElementById('errName').textContent = 'Name is required'; ok = false; }
    if (!cat)  { document.getElementById('errCategory').textContent = 'Category is required'; ok = false; }
    if (!price || parseFloat(price) < 0) { document.getElementById('errPrice').textContent = 'Valid price required'; ok = false; }
    if (!qty || parseInt(qty) < 0)       { document.getElementById('errQuantity').textContent = 'Valid quantity required'; ok = false; }
    return ok;
}
function clearErrors() { ['errName','errCategory','errPrice','errQuantity'].forEach(id => { document.getElementById(id).textContent = ''; }); }
function clearForm() {
    ['fieldName','fieldCategory','fieldPrice','fieldQuantity'].forEach(id => { document.getElementById(id).value = ''; });
    clearErrors();
}
function closeModal() { document.getElementById('productModal').classList.remove('open'); clearForm(); }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Events ────────────────────────────────────────────────────
function bindEvents() {
    document.getElementById('btnAdd').addEventListener('click', openAdd);
    document.getElementById('btnSave').addEventListener('click', saveProduct);
    document.getElementById('btnCancel').addEventListener('click', closeModal);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('btnDeleteConfirm').addEventListener('click', confirmDelete);
    document.getElementById('btnDeleteCancel').addEventListener('click', () => document.getElementById('deleteModal').classList.remove('open'));
    document.getElementById('deleteModalClose').addEventListener('click', () => document.getElementById('deleteModal').classList.remove('open'));
    document.getElementById('searchInput').addEventListener('input', debounce(() => loadProducts(0), 400));
    document.getElementById('categoryFilter').addEventListener('change', () => loadProducts(0));
    document.getElementById('statusFilter').addEventListener('change', () => loadProducts(0));
    // Close modals on backdrop click
    document.getElementById('productModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.getElementById('deleteModal').addEventListener('click', e => { if (e.target === e.currentTarget) document.getElementById('deleteModal').classList.remove('open'); });
}

init();
</script>
</body>
</html>
